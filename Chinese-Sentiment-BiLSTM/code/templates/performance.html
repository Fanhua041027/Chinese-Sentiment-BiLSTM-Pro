<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型性能对比</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1000px;
        }
        .report-card {
            margin-bottom: 30px;
        }
        .report-content {
            white-space: pre-wrap;
            font-family: monospace;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
        }
        .chart-container {
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5">模型性能对比</h1>
        
        <div class="mt-5 text-center">
            <a href="/" class="btn btn-secondary">返回首页</a>
            <a href="/trend" class="btn btn-primary ms-2">情感趋势分析</a>
        </div>
        
        <div class="chart-container">
            <h2 class="text-center">模型性能对比</h2>
            {% if model_comparison %}
            <img src="data:image/png;base64,{{ model_comparison }}" class="img-fluid rounded mx-auto d-block">
            {% else %}
            <p class="text-center text-muted">模型对比图未找到</p>
            {% endif %}
        </div>
        
        <div class="chart-container">
            <h2 class="text-center">Bi-LSTM训练曲线</h2>
            {% if training_curve %}
            <img src="data:image/png;base64,{{ training_curve }}" class="img-fluid rounded mx-auto d-block">
            {% else %}
            <p class="text-center text-muted">训练曲线未找到</p>
            {% endif %}
        </div>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card report-card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title">Bi-LSTM + Attention</h3>
                    </div>
                    <div class="card-body">
                        <div class="report-content">{{ bilstm_report }}</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card report-card">
                    <div class="card-header bg-secondary text-white">
                        <h3 class="card-title">Naive Bayes</h3>
                    </div>
                    <div class="card-body">
                        <div class="report-content">{{ nb_report }}</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card report-card">
                    <div class="card-header bg-success text-white">
                        <h3 class="card-title">BERT</h3>
                    </div>
                    <div class="card-body">
                        <div class="report-content">{{ bert_report }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
